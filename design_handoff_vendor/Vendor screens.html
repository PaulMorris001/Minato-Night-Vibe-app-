<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>NightVibe — Vendor screens</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #07040E; font-family: 'Inter', system-ui, sans-serif; color: #F4EEFF; min-height: 100vh; }
    * { box-sizing: border-box; }

    @keyframes nvPulseDot {
      0% { transform: scale(1); opacity: 0.8; }
      70% { transform: scale(2.2); opacity: 0; }
      100% { transform: scale(2.2); opacity: 0; }
    }
    ::-webkit-scrollbar { display: none; }

    .stage {
      min-height: 100vh;
      display: flex;
      gap: 40px;
      padding: 56px 40px 80px;
      align-items: flex-start;
      justify-content: center;
      flex-wrap: wrap;
      background:
        radial-gradient(60% 40% at 30% 20%, rgba(124,58,237,0.10) 0%, transparent 60%),
        radial-gradient(50% 40% at 80% 60%, rgba(236,72,153,0.08) 0%, transparent 60%),
        #07040E;
    }
    .stage-header { width: 100%; max-width: 1400px; margin: 0 auto 8px; padding: 0 8px; }
    .stage-title {
      font-family: 'Bricolage Grotesque', Inter, system-ui;
      font-weight: 800; font-size: 28px; letter-spacing: -0.02em; color: #F4EEFF;
    }
    .stage-sub {
      font-family: Inter, system-ui; font-size: 14px; color: rgba(244,238,255,0.55);
      margin-top: 6px; max-width: 740px; line-height: 1.5;
    }
    .phone-col { display: flex; flex-direction: column; align-items: center; gap: 14px; }
    .phone-label {
      font-family: 'Bricolage Grotesque', 'Inter', system-ui; font-size: 14px; font-weight: 700;
      color: rgba(244,238,255,0.92); letter-spacing: 0.01em;
    }
    .phone-sub { color: rgba(244,238,255,0.45); font-weight: 500; margin-left: 6px; }
    .phone-note {
      font-family: Inter, system-ui; font-size: 11px; color: rgba(244,238,255,0.42);
      max-width: 320px; text-align: center; line-height: 1.45;
    }
    .phone {
      width: 360px; height: 780px;
      border-radius: 50px;
      background: #000;
      padding: 9px;
      box-shadow:
        0 0 0 2px #1a1a1f,
        0 40px 100px -30px rgba(124,58,237,0.45),
        0 20px 60px -20px rgba(0,0,0,0.9);
      position: relative;
    }
    .phone-inner {
      width: 100%; height: 100%; border-radius: 41px;
      overflow: hidden; position: relative; background: #0B0613;
    }
    .notch {
      position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
      width: 110px; height: 32px; background: #000; border-radius: 20px; z-index: 30;
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="vendor.jsx"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "show": "all"
    }/*EDITMODE-END*/;

    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const t = tweaks || TWEAK_DEFAULTS;

      const screens = [
        { id: 'dashboard', label: '01 · Dashboard', sub: 'overview',
          note: 'Personalized greeting, earnings hero with sparkline + trend chip, 2×2 stats grid (services / bookings / rating / avg. price), categories, recent services.',
          Comp: VendorDashboard },
        { id: 'services',  label: '02 · Services',  sub: 'manage',
          note: 'Big title + add CTA, status filter pills, full-bleed service cards with cover poster, status pill, price tag, meta row and consolidated actions.',
          Comp: VendorServices },
        { id: 'account',   label: '03 · Account',   sub: 'settings',
          note: 'Business profile card with cover + avatar, status pills (verified, payouts, rating), then grouped settings sections with chevron rows and an empty-state for unset socials.',
          Comp: VendorAccount },
      ];
      const filtered = t.show === 'all' ? screens : screens.filter(s => s.id === t.show);

      return (
        <React.Fragment>
          <div className="stage">
            <div className="stage-header">
              <div className="stage-title">Vendor screens — revamped</div>
              <div className="stage-sub">Same dark + neon-purple palette and Bricolage / Inter type as the rest of the redesigned app. The vendor side gets the same editorial treatment — earnings hero, glassy stat cards, full-bleed service posters, and a business-card profile.</div>
            </div>
            {filtered.map(s => (
              <div key={s.id} className="phone-col" data-screen-label={s.label}>
                <div className="phone-label">{s.label}<span className="phone-sub">{s.sub}</span></div>
                <div className="phone">
                  <div className="notch"/>
                  <div className="phone-inner">
                    <s.Comp/>
                  </div>
                </div>
                <div className="phone-note">{s.note}</div>
              </div>
            ))}
          </div>

          <TweaksPanel title="Tweaks">
            <TweakSection title="Show screen">
              <TweakRadio
                options={[
                  { value: 'all',       label: 'All three' },
                  { value: 'dashboard', label: '01 Dashboard' },
                  { value: 'services',  label: '02 Services' },
                  { value: 'account',   label: '03 Account' },
                ]}
                value={t.show}
                onChange={(v) => setTweak('show', v)}
              />
            </TweakSection>
          </TweaksPanel>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
